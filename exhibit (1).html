<script>
var EXHIBITS = [{"id": "energy-conversion-gallery-beam-engine", "gallery": "Energy Conversion Gallery", "title": "Beam Engine", "desc": "A beam engine is an early type of steam engine where steam pressure pushes a piston that moves a huge pivoted overhead beam up and down. Steam enters the cylinder, pushes the piston, and the beam rocks like a giant see-saw — turning heat energy into mechanical work. James Watt's improvements to the beam engine in the 1760s helped kick-start the Industrial Revolution!", "year": "1760s"}, {"id": "energy-conversion-gallery-sources-of-power", "gallery": "Energy Conversion Gallery", "title": "Sources of Power", "desc": "This display compares the different ways humans generate power — solar, wind, fossil fuels, hydro, and geothermal energy. Each source converts energy from nature into electricity or mechanical work using different technologies like turbines, solar cells, or combustion. Solar and wind energy are renewable — they won't run out, unlike coal or oil which took millions of years to form.", "year": ""}, {"id": "energy-conversion-gallery-basic-mechanisms", "gallery": "Energy Conversion Gallery", "title": "Basic Mechanisms", "desc": "Simple machines — levers, pulleys, screws, inclined planes, wheels, and wedges — are the building blocks of all complex machines. Each device reduces the force needed to do work by increasing the distance over which it acts, following the conservation of energy. A door handle is a wheel-and-axle; scissors are two levers; a ramp is an inclined plane — simple machines are everywhere!", "year": ""}, {"id": "energy-conversion-gallery-early-steam-working", "gallery": "Energy Conversion Gallery", "title": "Early Steam Working", "desc": "Before modern engines, steam was explored as a power source as early as 1606 by Giovanni Della Porta. Denis Papin (1679) built the first pressure cooker, while Hero of Alexandria designed an early steam-spinning device almost 2,000 years ago. The pressure cooker in your kitchen uses the same basic principle Papin discovered over 300 years ago!", "year": "1606"}, {"id": "energy-conversion-gallery-energy-crisis", "gallery": "Energy Conversion Gallery", "title": "Energy Crisis", "desc": "This exhibit highlights the rapid depletion of Earth's fossil fuel reserves. Oil reserves may last only 42 more years, natural gas 61 years, and coal about 133 years at current usage rates. Fossil fuels supplied 85% of the world's energy in 2010 — but they take millions of years to form. We need to act fast!", "year": ""}, {"id": "energy-conversion-gallery-new-renewable-sources-of-energy", "gallery": "Energy Conversion Gallery", "title": "New & Renewable Sources of Energy", "desc": "This display presents solutions to the energy crisis — solar, wind, hydro, and geothermal energy as clean alternatives. Renewable sources harness freely available natural forces to generate electricity without harmful emissions. India has over 300 sunny days per year, making it one of the best countries in the world for solar energy!", "year": ""}, {"id": "energy-conversion-gallery-steam-plant", "gallery": "Energy Conversion Gallery", "title": "Steam Plant", "desc": "A steam plant generates electricity by heating water into high-pressure steam that spins a turbine connected to a generator. It operates on the Rankine cycle — water is boiled, steam expands through a turbine, then is condensed and reused. Steam power plants still generate more than 80% of the world's electricity!", "year": ""}, {"id": "energy-conversion-gallery-geo-thermal-power", "gallery": "Energy Conversion Gallery", "title": "Geo Thermal Power", "desc": "Geothermal energy harnesses heat from deep within the Earth — from magma, hot water reservoirs, or shallow steam reserves. Wells are drilled into Earth's crust to bring up hot steam, which drives turbines to generate electricity. The world's first geothermal power plant opened in Tuscany, Italy in 1904!", "year": "1904"}, {"id": "energy-conversion-gallery-wind-mill", "gallery": "Energy Conversion Gallery", "title": "Wind Mill", "desc": "A windmill converts the kinetic energy of blowing wind into mechanical energy using rotating blades. Wind pushes the blades in a circular motion; this rotational energy is transferred through a shaft to do useful work. One large modern turbine can power over 1,500 average Indian homes!", "year": ""}, {"id": "energy-conversion-gallery-mhd-power-generation-plant", "gallery": "Energy Conversion Gallery", "title": "MHD Power Generation Plant", "desc": "Magneto-Hydro-Dynamic (MHD) power generation uses the interaction between a magnetic field and electrically conducting plasma to directly produce electricity — no moving mechanical parts needed! MHD generators are far more efficient than traditional ones and could be the power plants of the future.", "year": ""}, {"id": "energy-conversion-gallery-modern-gas-turbine", "gallery": "Energy Conversion Gallery", "title": "Modern Gas Turbine", "desc": "A gas turbine compresses air, mixes it with fuel, ignites the mixture, and lets the hot expanding gases spin a turbine. It operates on the Brayton cycle and is used in power plants, jet aircraft engines, and marine ships. Jet aircraft engines are essentially gas turbines — the same technology gets you to your destination at 900 km/h!", "year": ""}, {"id": "energy-conversion-gallery-early-water-wheel", "gallery": "Energy Conversion Gallery", "title": "Early Water Wheel", "desc": "A water wheel is one of humanity's oldest machines — it captures the energy of flowing water to turn a wheel and do mechanical work. The Romans used water wheels for grinding grain and mining. Ancient Romans built water-wheel mills that could grind enough flour to feed 80,000 people per day!", "year": ""}, {"id": "energy-conversion-gallery-hydro-turbine-francis", "gallery": "Energy Conversion Gallery", "title": "Hydro Turbine — Francis", "desc": "The Francis turbine is a reaction turbine used in hydroelectric power plants, designed for medium-to-high water heads. Water flows through a spiral casing, passes through guide vanes, and strikes curved runner blades — the spinning runner drives a generator. The Francis turbine is the most widely used turbine in the world!", "year": ""}, {"id": "energy-conversion-gallery-hydro-turbine-pelton-wheel", "gallery": "Energy Conversion Gallery", "title": "Hydro Turbine — Pelton Wheel", "desc": "A Pelton wheel is an impulse turbine where high-speed jets of water strike cup-shaped buckets around a wheel, making it spin rapidly. The water's kinetic energy is converted to mechanical energy — best used at very high altitudes with fast-falling water. Pelton wheels are used in Himalayan power stations where water falls from over 1,000 metres!", "year": ""}, {"id": "energy-conversion-gallery-hydro-turbine-kaplan", "gallery": "Energy Conversion Gallery", "title": "Hydro Turbine — Kaplan", "desc": "The Kaplan turbine works like an adjustable ship propeller running in reverse — water flows through it and makes it spin. Its adjustable blades change angle to suit varying water flow, making it ideal for low-head installations like large river dams. Kaplan turbines can operate in rivers with as little as 2 metres of water head!", "year": ""}, {"id": "energy-conversion-gallery-before-and-after-dam", "gallery": "Energy Conversion Gallery", "title": "Before and After Dam", "desc": "This exhibit shows how building a dam transforms a river valley — creating a large reservoir upstream while controlling water flow downstream. A dam acts as a barrier, storing water for irrigation, drinking, and power generation while also preventing floods. India's dams irrigate millions of acres of farmland, feeding a large part of the country's 1.4 billion people!", "year": ""}, {"id": "energy-conversion-gallery-india-dam", "gallery": "Energy Conversion Gallery", "title": "India Dam", "desc": "India has hundreds of major dams that play a critical role in water supply, electricity, flood control, and irrigation. Dams store the potential energy of water at height and release it through turbines to generate clean hydroelectric power. The Tehri Dam in Uttarakhand is one of the tallest dams in the world — taller than 25 ten-storey buildings stacked up!", "year": ""}, {"id": "energy-conversion-gallery-solar-thermal-power", "gallery": "Energy Conversion Gallery", "title": "Solar Thermal Power", "desc": "Solar thermal plants use large arrays of mirrors to concentrate sunlight, heating a fluid that produces steam to run turbines. Unlike solar panels, solar thermal uses heat — concentrated sunlight can reach temperatures over 500°C! The Rajasthan desert gets so much sunlight that solar thermal plants there can generate power for millions of homes.", "year": ""}, {"id": "energy-conversion-gallery-rajasthan-atomic-power-plant", "gallery": "Energy Conversion Gallery", "title": "Rajasthan Atomic Power Plant", "desc": "The Rajasthan Atomic Power Plant at Rawatbhata uses nuclear fission — splitting uranium atoms — to generate heat and electricity. Controlled splitting of uranium atoms creates a chain reaction that heats water into steam, which spins turbines. One kg of uranium fuel releases as much energy as burning about 3,000 tonnes of coal!", "year": ""}, {"id": "energy-conversion-gallery-fast-breeder-nuclear-reactor", "gallery": "Energy Conversion Gallery", "title": "Fast Breeder Nuclear Reactor", "desc": "A fast breeder reactor not only generates power but also creates more nuclear fuel (plutonium) than it uses! Fast neutrons convert non-fissile uranium-238 into fissile plutonium-239, which can fuel more reactors. India's PFBR at Kalpakkam, Tamil Nadu is one of only a handful of fast breeder reactors in the world!", "year": ""}, {"id": "energy-conversion-gallery-power-from-sea", "gallery": "Energy Conversion Gallery", "title": "Power from Sea", "desc": "The ocean holds enormous energy in its tides, waves, and temperature differences — all of which can be harnessed to generate electricity. Tidal power uses the rise and fall of sea levels; wave energy captures up-and-down motion; OTEC uses temperature differences. The total wave energy reaching Earth's coastlines each year exceeds the world's entire electricity consumption!", "year": ""}, {"id": "energy-conversion-gallery-power-transmission", "gallery": "Energy Conversion Gallery", "title": "Power Transmission", "desc": "Once electricity is generated, it travels long distances through transmission lines at very high voltages (up to 765,000 volts) to reach our homes. High voltage reduces current, which reduces energy lost as heat — transformers step voltage up for transmission and down for use. India's power transmission network spans over 4,00,000 km — enough to go around Earth ten times!", "year": ""}, {"id": "energy-conversion-gallery-power-distribution-station", "gallery": "Energy Conversion Gallery", "title": "Power Distribution Station", "desc": "A power distribution station receives high-voltage electricity from transmission lines and steps it down to safe voltages for homes and businesses. Transformers reduce voltage in stages: from 765 kV → 220 kV → 33 kV → 11 kV → 230 V for household use. Without distribution stations, the electricity from a power plant would be too dangerous to use in your home!", "year": ""}, {"id": "metallurgy-gallery-iron-pillar-replica", "gallery": "Metallurgy Gallery", "title": "Iron Pillar Replica", "desc": "The Iron Pillar of Delhi, erected by Chandragupta II (~375 AD), is 7 metres tall and has resisted rust for over 1,600 years! IIT Kanpur scientists discovered a thin protective layer of 'misawite' that forms a natural anti-rust shield. Ancient Indian metallurgists achieved a level of iron-working that modern scientists are still studying!", "year": "375 AD"}, {"id": "metallurgy-gallery-early-smithy-techniques", "gallery": "Metallurgy Gallery", "title": "Early Smithy Techniques", "desc": "A smithy is where iron is shaped into useful objects using a forge, anvil, and hammer. Iron is heated until red-hot and malleable, then beaten into shape on an anvil — one of humanity's oldest metalworking crafts. The word 'blacksmith' comes from 'black metal' (iron) + 'smite' (to hit)!", "year": ""}, {"id": "metallurgy-gallery-blast-furnace", "gallery": "Metallurgy Gallery", "title": "Blast Furnace", "desc": "A blast furnace is a towering structure where iron ore, coke, and limestone are heated with hot air blasts to extract pure molten iron. Iron ore (Fe2O3) is reduced by carbon monoxide, releasing liquid iron that sinks to the bottom, while slag floats on top. The first blast furnaces appeared in the 14th century and produced 1 tonne per day — modern ones produce over 10,000 tonnes!", "year": "14th Century"}, {"id": "metallurgy-gallery-bessemer-converter", "gallery": "Metallurgy Gallery", "title": "Bessemer Converter", "desc": "The Bessemer converter (1856) was a revolutionary steel-making device — a huge egg-shaped vessel that blew air through molten iron to burn away impurities. Before Bessemer, making steel took days; the converter did it in under 30 minutes — revolutionising construction and railways worldwide!", "year": "1856"}, {"id": "metallurgy-gallery-arc-furnace", "gallery": "Metallurgy Gallery", "title": "Arc Furnace", "desc": "An Electric Arc Furnace (EAF) uses powerful electric arcs between graphite electrodes and steel scrap to generate temperatures over 3,000°C. Steel scrap is loaded in, electrodes are lowered, and an electric arc melts everything into liquid steel. The electricity for one EAF melt (150 tonnes) is enough to power a town of 100,000 people!", "year": ""}, {"id": "metallurgy-gallery-oxygen-blown-converter", "gallery": "Metallurgy Gallery", "title": "Oxygen Blown Converter", "desc": "The Basic Oxygen Furnace (BOF) converts molten iron from a blast furnace into steel by blowing pure oxygen into the liquid metal. Pure oxygen reacts with excess carbon far more efficiently than air — making a tonne of steel in just 20 minutes. Over 70% of the world's steel today is made in oxygen blown converters!", "year": ""}, {"id": "metallurgy-gallery-induction-furnace", "gallery": "Metallurgy Gallery", "title": "Induction Furnace", "desc": "An induction furnace uses electromagnetic induction to generate heat inside the metal itself — no external flame needed. Alternating current in coils creates rapidly changing magnetic fields that induce electric currents inside metal, heating it from within. Induction furnaces are so precise they are used to make surgical tools, aerospace alloys, and jewellery!", "year": ""}, {"id": "metallurgy-gallery-rolling-mill", "gallery": "Metallurgy Gallery", "title": "Rolling Mill", "desc": "A rolling mill passes hot or cold metal between heavy rollers to flatten it into sheets, rods, rails, or beams of uniform thickness. Hot rolling works above the metal's recrystallisation temperature; cold rolling gives a smooth surface finish. Every railway track, steel beam, and tin can started life as a thick slab that passed through a rolling mill!", "year": ""}, {"id": "metallurgy-gallery-forging-shop", "gallery": "Metallurgy Gallery", "title": "Forging Shop", "desc": "Forging shapes metal by applying compressive forces — hammering, pressing, or rolling — often while the metal is hot and malleable. Different forging types include drop forging, press forging, and open-die forging. Forged parts are stronger than cast ones because the process aligns the metal's grain structure!", "year": ""}, {"id": "metallurgy-gallery-cast-iron-foundry", "gallery": "Metallurgy Gallery", "title": "Cast Iron Foundry", "desc": "In a foundry, molten iron is poured into shaped moulds and allowed to solidify — creating complex 3D metal objects. Patterns create hollow cavities in sand moulds; liquid metal fills these cavities and takes their shape. Engine blocks, manhole covers, cooking pots, and ornamental gates are all made by casting!", "year": ""}, {"id": "metallurgy-gallery-aluminium-pot-room", "gallery": "Metallurgy Gallery", "title": "Aluminium Pot Room", "desc": "The pot room is where alumina is converted to aluminium metal using electrolysis — the Hall-Héroult process. Massive electric currents (up to 500,000 amperes) pass through molten alumina dissolved in cryolite, separating pure aluminium at the bottom. Making 1 kg of aluminium requires about 13 kWh of electricity — which is why recycling saves 95% of that energy!", "year": ""}, {"id": "transportation-gallery-wheel-through-centuries", "gallery": "Transportation Gallery", "title": "Wheel Through Centuries", "desc": "The wheel — invented around 3500 BC in Mesopotamia — is arguably humanity's greatest invention, evolving from solid wooden discs to modern pneumatic tyres. Spoked wheels (2000 BC Egypt) reduced weight; iron rims improved durability; pneumatic tyres (1888) absorbed road shocks. The latest 'Tweel' is an airless tyre that never goes flat!", "year": "3500 BC"}, {"id": "transportation-gallery-steam-carriage", "gallery": "Transportation Gallery", "title": "Steam Carriage", "desc": "A steam carriage was an early self-propelled road vehicle powered by a steam engine — the ancestor of all automobiles. Water was heated in a boiler; steam pressure pushed pistons connected to drive wheels — no horses needed! Richard Trevithick built the first steam carriage in 1801 in Cornwall — nicknamed 'Puffing Devil'!", "year": "1801"}, {"id": "transportation-gallery-early-modern-aircraft-models", "gallery": "Transportation Gallery", "title": "Early & Modern Aircraft Models", "desc": "From the Wright Brothers' 1903 Flyer (12 seconds in the air) to supersonic jets, aircraft design has been transformed by aerodynamics. Aircraft generate lift because their wing shape makes air flow faster over the top, reducing pressure and creating an upward force (Bernoulli's principle). The Wright Flyer's entire flight path is shorter than the wingspan of a modern Boeing 747!", "year": "1903"}, {"id": "transportation-gallery-comet", "gallery": "Transportation Gallery", "title": "Comet", "desc": "The de Havilland Comet (1952) was the world's first commercial jet airliner — flying at 800 km/h at altitudes propeller planes couldn't reach. Jet engines compress air, mix it with fuel, and ignite it — thrust from exhausting hot gases propels the aircraft. Early Comets suffered crashes caused by metal fatigue at square windows — leading to the oval windows we see today!", "year": "1952"}, {"id": "transportation-gallery-bridges-and-highways", "gallery": "Transportation Gallery", "title": "Bridges and Highways", "desc": "Bridges allow roads to cross rivers and valleys — using principles of compression, tension, and bending to carry enormous loads. Different bridge types include beam, arch, suspension, and cable-stayed — each using different structural principles. India's Bandra-Worli Sea Link has enough steel wire to circle the Earth's equator one and a half times!", "year": ""}, {"id": "transportation-gallery-sea-port", "gallery": "Transportation Gallery", "title": "Sea Port", "desc": "A sea port is a hub of global trade — equipped with cranes, container terminals, and navigational aids to load and unload massive cargo ships. Modern container ports use giant gantry cranes to load standardised containers onto ships — enabling 90% of the world's goods to travel by sea. The Port of Shanghai handles over 47 million containers every year!", "year": ""}, {"id": "transportation-gallery-ship-through-centuries", "gallery": "Transportation Gallery", "title": "Ship Through Centuries", "desc": "Ships have evolved from simple dugout canoes (10,000 BC) through wooden sailing galleons to steel-hulled container ships. Key innovations include the sail, rudder, iron/steel hulls, steam engines, and diesel propulsion. Ancient Phoenician sailors were navigating the Mediterranean Sea 3,000 years ago — using only the stars as their GPS!", "year": "10,000 BC"}, {"id": "transportation-gallery-early-steam-locomotive", "gallery": "Transportation Gallery", "title": "Early Steam Locomotive", "desc": "George Stephenson built 'Locomotion No.1' in 1825 — the world's first steam locomotive to carry passengers on a public railway. Steam pressure from a boiler moved pistons connected to driving wheels; early locomotives burned coal and reached 15–20 km/h. Stephenson chose a track gauge of 4 feet 8.5 inches — still the world's standard railway gauge used today!", "year": "1825"}, {"id": "transportation-gallery-electric-locomotive", "gallery": "Transportation Gallery", "title": "Electric Locomotive", "desc": "Electric locomotives draw power from overhead wires and convert it into motion — faster, quieter, and cleaner than steam. Electric motors convert electrical energy directly into rotational motion, making electric trains extremely efficient. India's Vande Bharat Express is an electric train that reaches 180 km/h — over 10 times faster than Stephenson's first train!", "year": ""}, {"id": "space-gallery-mercury-capsule", "gallery": "Space Gallery", "title": "Mercury Capsule", "desc": "NASA's Project Mercury (1958–63) was America's first human spaceflight programme — its cone-shaped capsule carried one astronaut into orbit. The capsule was launched on Atlas rockets, orbited Earth, then re-entered using a heat shield, and parachuted into the ocean. The Mercury capsule was named after the Roman god of speed!", "year": "1958–1963"}, {"id": "space-gallery-space-shuttle", "gallery": "Space Gallery", "title": "Space Shuttle", "desc": "The Space Shuttle (1981–2011) was the world's first reusable spacecraft — launching like a rocket and landing like a glider on a runway. It carried up to 7 astronauts and 24 tonnes of cargo, launched satellites, built the ISS, and serviced the Hubble Space Telescope. The Space Shuttle orbited Earth at 28,000 km/h — circling the globe in just 90 minutes!", "year": "1981–2011"}, {"id": "space-gallery-astronaut-rakesh-sharma", "gallery": "Space Gallery", "title": "Astronaut — Rakesh Sharma", "desc": "Rakesh Sharma became India's first astronaut on April 3, 1984, when he flew aboard the Soviet Soyuz T-11 spacecraft. When asked by Prime Minister Indira Gandhi how India looked from space, he famously replied: 'Saare Jahaan Se Achha'. Sharma spent 7 days, 21 hours in space — conducting yoga experiments in weightlessness!", "year": "1984"}, {"id": "space-gallery-mars-diorama", "gallery": "Space Gallery", "title": "Mars Diorama", "desc": "Mars features the solar system's tallest volcano (Olympus Mons, 27 km high) and longest canyon (Valles Marineris, 4,000 km long). Mars has a thin CO2 atmosphere, evidence of ancient river valleys, and average temperatures of -60°C. NASA's Perseverance rover has been exploring Mars since 2021, searching for signs of ancient microbial life!", "year": ""}, {"id": "space-gallery-chandrayaan", "gallery": "Space Gallery", "title": "Chandrayaan", "desc": "Chandrayaan-1 (2008) made the groundbreaking discovery of water molecules on the Moon; Chandrayaan-3 (2023) successfully landed near the lunar south pole. Chandrayaan-3's Vikram lander and Pragyan rover conducted science experiments on the Moon's surface. India became only the 4th nation to soft-land on the Moon — and the first to land near the south pole!", "year": "2008 & 2023"}, {"id": "space-gallery-big-bang", "gallery": "Space Gallery", "title": "Big Bang", "desc": "The Big Bang Theory states that the universe began about 13.8 billion years ago from an extremely hot, dense point and has been expanding ever since. In the first seconds, subatomic particles formed; later, atoms, then stars and galaxies — the universe is still expanding today. Look up at the night sky and you are literally looking back in time!", "year": "13.8 Billion Years Ago"}, {"id": "space-gallery-our-solar-system", "gallery": "Space Gallery", "title": "Our Solar System", "desc": "The solar system formed 4.6 billion years ago from a rotating cloud of gas and dust. The Sun contains over 99% of the solar system's mass; planets orbit it in ellipses held by gravitational force. If the Sun were a basketball, Earth would be a grape seed 26 metres away — and Neptune would be over 800 metres distant!", "year": "4.6 Billion Years Old"}, {"id": "coal-mine-gallery-cut-globe", "gallery": "Coal Mine Gallery", "title": "Cut Globe", "desc": "A cut globe shows the interior layers of Earth — the inner and outer core, mantle, and crust. Earth's inner core is solid iron-nickel at 5,400°C; the outer core is liquid iron generating Earth's magnetic field; the mantle is hot slow-flowing rock. If you could travel to Earth's centre, the pressure would be 3.5 million times greater than at the surface!", "year": ""}, {"id": "coal-mine-gallery-mineral-map-of-india", "gallery": "Coal Mine Gallery", "title": "Mineral Map of India", "desc": "India is rich in minerals — coal in Jharkhand and Odisha; iron ore in Goa and Chhattisgarh; bauxite in Odisha; copper in Rajasthan. This map shows where different minerals are found across India, explaining why certain industries are located in specific regions. India has the world's 4th largest coal reserves — enough to last over 100 years at current usage rates!", "year": ""}, {"id": "coal-mine-gallery-makrana-marble-mine", "gallery": "Coal Mine Gallery", "title": "Makrana Marble Mine", "desc": "Makrana in Rajasthan is world-famous for its pure white marble — the same marble used to build the Taj Mahal over 350 years ago! Marble is formed when limestone is subjected to extreme heat and pressure deep underground — a process called metamorphism. Over 1,000 craftsmen worked for 22 years to build the Taj Mahal, using 28,000 tonnes of Makrana marble!", "year": ""}, {"id": "coal-mine-gallery-coal-formation", "gallery": "Coal Mine Gallery", "title": "Coal Formation", "desc": "Coal formed from dense forests that grew in tropical swamps 300 million years ago — when plants died, they were compressed by layers of sediment over millennia. Plant material slowly transformed: peat → lignite → bituminous coal → anthracite — each stage has more carbon and energy. Coal takes 300 million years to form but we've burned most reserves in just 300 years!", "year": "300 Million Years Old"}, {"id": "coal-mine-gallery-coal-mine-shaft-equipment", "gallery": "Coal Mine Gallery", "title": "Coal Mine Shaft & Equipment", "desc": "A coal mine shaft is a vertical tunnel sunk into the earth to access underground coal seams — equipped with lifts, ventilation, and water pumps. Miners descend the shaft in cages; cutting machines, roof supports, and conveyor belts work together to extract and transport coal safely. The deepest coal mine shafts go over 3,000 metres underground — where temperatures can reach 60°C!", "year": ""}, {"id": "coal-mine-gallery-long-wall-coal-mine", "gallery": "Coal Mine Gallery", "title": "Long Wall Coal Mine", "desc": "Longwall mining is a highly efficient method where a shearing machine cuts a long face of coal (up to 400 m wide) in a single pass. Hydraulic roof supports protect miners as the cutting machine moves back and forth; extracted coal falls onto a conveyor belt to the surface. A modern longwall mine can extract over 5 million tonnes of coal per year!", "year": ""}, {"id": "coal-mine-gallery-gold-mine", "gallery": "Coal Mine Gallery", "title": "Gold Mine", "desc": "Gold occurs naturally in quartz veins and alluvial deposits — mined by crushing ore and using cyanide leaching to extract pure gold. India's Kolar Gold Fields in Karnataka were once among the world's deepest gold mines — shafts going over 3 km below the surface. All the gold ever mined would form a cube just 21 metres on each side!", "year": ""}, {"id": "coal-mine-gallery-volcano-eruption", "gallery": "Coal Mine Gallery", "title": "Volcano Eruption", "desc": "A volcano is an opening in Earth's crust where molten rock (magma), ash, and gases escape — releasing enormous stored energy. Magma forms when rock melts due to heat or reduced pressure in the mantle; it rises and erupts as lava when it reaches the surface. The 1815 eruption of Mount Tambora caused 'The Year Without Summer' — crops failed across the entire Northern Hemisphere!", "year": ""}, {"id": "coal-mine-gallery-copper-mine", "gallery": "Coal Mine Gallery", "title": "Copper Mine", "desc": "Copper — one of the first metals used by humans — is mined from ores like chalcopyrite, crushed, and smelted to produce pure copper metal. India's Khetri Copper Complex in Rajasthan is one of the largest copper projects in Asia. Copper was the first metal worked by humans, over 10,000 years ago — and it's still essential in every electrical wire and circuit board!", "year": "10,000 Years Ago"}, {"id": "electronic-gallery-electronic-marvels", "gallery": "Electronic Gallery", "title": "Electronic Marvels", "desc": "Electronics transformed the 20th century — from radios and televisions to computers and smartphones, using circuits of tiny components to process signals. Electronic devices control the flow of electrons using resistors, capacitors, transistors, and integrated circuits. The first computer ENIAC (1945) weighed 27 tonnes and filled a room — today your phone is millions of times more powerful!", "year": "1945"}, {"id": "electronic-gallery-t-v-video", "gallery": "Electronic Gallery", "title": "T.V. / Video", "desc": "Television works by converting light into electronic signals, transmitting them, and reconverting them into images on a screen. Early TVs used cathode ray tubes (CRT); modern TVs use LCD, LED, OLED, or QLED displays. The first TV broadcast in India was in Delhi in 1959 — on a small screen in a modest studio. Today India has over 900 TV channels!", "year": "1959"}, {"id": "electronic-gallery-robot", "gallery": "Electronic Gallery", "title": "Robot", "desc": "Robots are programmable machines that carry out complex tasks automatically — used in manufacturing, surgery, space exploration, and disaster response. Robots use sensors, actuators (motors), and computers running programmed instructions to perceive and interact with their environment. The word 'robot' comes from the Czech word 'robota' meaning forced labour!", "year": ""}, {"id": "electronic-gallery-silicon-chip", "gallery": "Electronic Gallery", "title": "Silicon Chip", "desc": "A silicon chip (integrated circuit) packs millions — now billions — of transistors onto a fingernail-sized piece of silicon, forming the brain of every electronic device. Chips are made through photolithography — shining UV light through a mask to etch circuit patterns into silicon. Intel's latest chips have over 50 billion transistors, each thinner than a human DNA strand!", "year": ""}, {"id": "chemical-technology-gallery-fertilizer-plant", "gallery": "Chemical Technology Gallery", "title": "Fertilizer Plant", "desc": "Fertilizer plants manufacture nitrogen, phosphorus, and potassium compounds that replenish soil nutrients and dramatically increase crop yields. The Haber-Bosch process (1909) combines atmospheric nitrogen with hydrogen at high temperature and pressure to make ammonia — the basis of all nitrogen fertilisers. The Haber-Bosch process feeds half of humanity!", "year": "1909"}, {"id": "chemical-technology-gallery-oil-refinery", "gallery": "Chemical Technology Gallery", "title": "Oil Refinery", "desc": "An oil refinery separates crude petroleum into useful products — petrol, diesel, kerosene, LPG, and raw materials for plastics — through fractional distillation. Crude oil is heated; different hydrocarbon fractions boil at different temperatures and are collected at different heights in a distillation column. One barrel of crude oil (159 litres) produces about 70 litres of petrol plus much more!", "year": ""}, {"id": "chemical-technology-gallery-sambhar-salt-lake", "gallery": "Chemical Technology Gallery", "title": "Sambhar Salt Lake", "desc": "Sambhar Salt Lake in Rajasthan is India's largest inland saltwater lake — one of the most important sources of salt in the country. During winter, the lake's water evaporates leaving behind salt crystals harvested using a process unchanged for over 1,000 years. Sambhar Lake is also a Ramsar Wetland and hosts thousands of flamingos!", "year": ""}, {"id": "chemical-technology-gallery-paper-mill", "gallery": "Chemical Technology Gallery", "title": "Paper Mill", "desc": "Paper is made from plant fibres (wood pulp, bamboo, or recycled paper) beaten into a slurry, spread on screens, and dried into sheets. In the Kraft process, wood chips are cooked in chemicals to dissolve lignin, leaving pure cellulose fibres for paper. Recycling one tonne of paper saves 17 trees and 26,000 litres of water!", "year": ""}, {"id": "chemical-technology-gallery-sugar-factory", "gallery": "Chemical Technology Gallery", "title": "Sugar Factory", "desc": "A sugar factory extracts sucrose from sugarcane by crushing, clarifying the juice, evaporating water, and crystallising the sugar. Sugarcane is crushed between rollers; juice is heated with lime to remove impurities; evaporation concentrates it; cooling crystallises pure white sugar. India is the world's largest consumer of sugar and the second largest producer!", "year": ""}, {"id": "textile-gallery-jute-mill", "gallery": "Textile Gallery", "title": "Jute Mill", "desc": "Jute — the 'golden fibre' — is grown mainly in West Bengal; jute mills weave it into sacking, rope, carpet backing, and eco-friendly bags. Jute fibres are extracted from the stalks by retting (soaking in water), then spun and woven into coarse but strong fabric. Jute is 100% biodegradable and grows without pesticides — one of the most eco-friendly natural fibres!", "year": ""}, {"id": "textile-gallery-cotton-mill", "gallery": "Textile Gallery", "title": "Cotton Mill", "desc": "Cotton mills use spinning machines and power looms to transform raw cotton fibres into yarn and then into woven cloth at industrial scale. Cotton fibres are ginned (seeds removed), cleaned, carded (straightened), spun into yarn, and woven into fabric. India was once the world's leading cotton textile producer!", "year": ""}, {"id": "textile-gallery-silk-moth-life-history", "gallery": "Textile Gallery", "title": "Silk Moth Life History", "desc": "Silk comes from the cocoon of the mulberry silkworm (Bombyx mori) — a caterpillar that spins a continuous filament of silk to form its chrysalis. Life cycle: egg → caterpillar (feeds on mulberry leaves) → cocoon (silk thread) → moth. Boiling the cocoon unravels up to 1.5 km of silk filament! One silk saree requires cocoons of about 10,000 silkworms.", "year": ""}, {"id": "textile-gallery-nylon-polyester-yarn-production", "gallery": "Textile Gallery", "title": "Nylon & Polyester Yarn Production", "desc": "Nylon (1938) was the world's first fully synthetic fibre — made from chemicals derived from coal, oil, and natural gas through polymerisation. Polyester is made by reacting acids and alcohols to form long polymer chains, melted and extruded through tiny holes to form strong, wrinkle-resistant fibres. The first nylon stockings (1940) — 72,000 pairs sold out in just a few hours!", "year": "1938"}, {"id": "textile-gallery-charkha-spinning-wheel", "gallery": "Textile Gallery", "title": "Charkha (Spinning Wheel)", "desc": "The charkha is a portable hand-spinning wheel that Mahatma Gandhi made the symbol of India's independence movement and self-reliance (Swadeshi). A charkha twists fibres together into strong yarn using a hand-cranked spindle — entirely self-powered. Gandhi spun on his charkha every single day — even while travelling — saying 'Spinning is my meditation.'", "year": ""}, {"id": "agriculture-gallery-green-revolution", "gallery": "Agriculture Gallery", "title": "Green Revolution", "desc": "The Green Revolution (1960s–70s) introduced high-yielding dwarf wheat and rice varieties, chemical fertilisers, and modern irrigation — saving millions from starvation. Led by scientists like M.S. Swaminathan and Norman Borlaug, wheat production in India tripled between 1965 and 1975. India went from importing food in the 1960s to exporting over 20 million tonnes of rice per year today!", "year": "1960s–70s"}, {"id": "agriculture-gallery-tea-garden-factory", "gallery": "Agriculture Gallery", "title": "Tea Garden & Factory", "desc": "India is the world's 2nd largest tea producer — grown in Darjeeling, Assam, and the Nilgiris. Tea leaves are plucked (only the top 2 leaves and bud), withered, rolled, oxidised (for black tea), and dried to produce the final product. A single Assam estate can be larger than an entire European city!", "year": ""}, {"id": "agriculture-gallery-dairy-farm", "gallery": "Agriculture Gallery", "title": "Dairy Farm", "desc": "India has the world's largest dairy industry — with about 500 million cattle and buffalo producing over 230 million tonnes of milk annually. Modern dairy farms use scientific feeding, veterinary care, milking machines, and cold chains to maximise milk production. Operation Flood transformed India from a milk-deficit country to the world's largest milk producer!", "year": ""}, {"id": "agriculture-gallery-rubber-plantation", "gallery": "Agriculture Gallery", "title": "Rubber Plantation", "desc": "India is the world's 4th largest natural rubber producer — grown mainly in Kerala where rubber trees thrive. Latex (natural rubber liquid) is tapped from the bark by making a spiral cut; it is coagulated with acid, rolled into sheets, and dried. All rubber trees outside the Amazon trace back to seeds smuggled from Brazil in 1876!", "year": ""}, {"id": "agriculture-gallery-tractor-agriculture-implements", "gallery": "Agriculture Gallery", "title": "Tractor & Agriculture Implements", "desc": "Modern tractors and implements — ploughs, seed drills, harvesters, and irrigation pumps — have transformed farming from manual labour to mechanised efficiency. A tractor converts diesel fuel energy into mechanical power through its engine and PTO shaft, which drives attached implements. One tractor can do the work of 50 bullocks in the same time!", "year": ""}, {"id": "human-biology-gallery-heart", "gallery": "Human Biology Gallery", "title": "Heart", "desc": "The heart is a fist-sized muscle that pumps blood through 100,000 km of blood vessels — beating about 100,000 times every day without ever stopping! It has four chambers: right atrium and ventricle pump deoxygenated blood to the lungs; left atrium and ventricle pump oxygenated blood to the body. In a lifetime of 80 years, your heart beats about 3 billion times!", "year": ""}, {"id": "human-biology-gallery-eye", "gallery": "Human Biology Gallery", "title": "Eye", "desc": "The human eye can detect about 10 million different colours and distinguish shapes in both bright sunlight and dim moonlight. Light enters through the cornea, passes through the pupil and lens, and hits the retina where rods and cones convert it to nerve signals. The eye can detect a candle flame from 14 km away in complete darkness!", "year": ""}, {"id": "human-biology-gallery-brain", "gallery": "Human Biology Gallery", "title": "Brain", "desc": "The brain contains 86 billion neurons each connected to up to 10,000 others, forming 100 trillion synapses. Divided into cerebrum (thinking), cerebellum (coordination), and brainstem (breathing, heart rate), the brain processes over 400 billion bits of information per second. Your brain generates enough electricity to power a small LED light bulb!", "year": ""}, {"id": "human-biology-gallery-skeletal-system", "gallery": "Human Biology Gallery", "title": "Skeletal System", "desc": "The human skeleton has 206 bones that provide structural support, protect vital organs, enable movement, and produce blood cells in bone marrow. Bones are living organs — constantly remodelling themselves; made of collagen (flexibility) and calcium phosphate (hardness) — stronger than concrete for their weight. You are born with 270 bones — some fuse as you grow, leaving 206 by adulthood!", "year": ""}, {"id": "human-biology-gallery-respiratory-system", "gallery": "Human Biology Gallery", "title": "Respiratory System", "desc": "The respiratory system delivers oxygen to the blood and removes carbon dioxide — the lungs contain 300 million tiny air sacs (alveoli) with a total surface area of 70 m². Breathing in: diaphragm contracts, chest expands, air rushes into lungs; oxygen passes into blood capillaries; CO2 passes out and is exhaled. You breathe about 22,000 times per day!", "year": ""}, {"id": "human-biology-gallery-human-evolution", "gallery": "Human Biology Gallery", "title": "Human Evolution", "desc": "Modern humans (Homo sapiens) evolved in Africa about 300,000 years ago, descended from a lineage that branched from other apes about 7 million years ago. Key stages: Australopithecus → Homo habilis (tool use) → Homo erectus (fire) → Homo sapiens. You share 98.7% of your DNA with chimpanzees — and 60% with a banana!", "year": "300,000 Years Ago"}];
function getParam(n){return new URLSearchParams(window.location.search).get(n);}
function render(){
  var id=getParam('id');
  var app=document.getElementById('app');
  if(!id){
    app.innerHTML='<div class="not-found"><h2>Birla Museum</h2><p>BITS Pilani</p><p style="margin-top:1rem;font-size:13px;color:rgba(240,237,230,.4);">Scan a QR code at any exhibit to view its information.</p></div>';
    return;
  }
  var ex=null;
  for(var i=0;i<EXHIBITS.length;i++){if(EXHIBITS[i].id===id){ex=EXHIBITS[i];break;}}
  if(!ex){
    app.innerHTML='<div class="not-found"><h2>Exhibit not found</h2><p>Please scan the correct QR code.</p></div>';
    return;
  }
  document.title=ex.title+' - Birla Museum';
  var yh=ex.year?'<p class="era">'+ex.year+'</p>':'';
  var yf=ex.year?'<div class="fact"><div class="fact-l">Era</div><div class="fact-v">'+ex.year+'</div></div>':'';
  app.innerHTML=
    '<p class="museum">Birla Museum - BITS Pilani</p>'+
    '<div class="badge">'+ex.gallery+'</div>'+
    '<h1>'+ex.title+'</h1>'+yh+
    '<hr/><p class="label">About this exhibit</p>'+
    '<p class="desc">'+ex.desc+'</p>'+
    '<div class="facts">'+yf+
    '<div class="fact"><div class="fact-l">Gallery</div><div class="fact-v">'+ex.gallery.replace(' Gallery','')+'</div></div>'+
    '</div>'+
    '<div class="footer">Scan other QR codes around the museum to explore more exhibits.</div>';
}
render();
</script>
